name: Deploy to GitHub Pages

# Триггер: запускать workflow при каждом пуше в ветки main или Type_Script
on:
  push:
    branches:
      - main
      - Type_Script
  workflow_dispatch:

# Устанавливаем права для работы с GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Управляем очередью развертывания
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build # Это создаст папку dist с правильными файлами

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # ЗАГРУЖАЕМ ТОЛЬКО ПАПКУ DIST!

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4