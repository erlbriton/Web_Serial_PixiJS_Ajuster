<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Web Serial PixiJS Diagnostic Stand</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
    <style>
        body { font-family: monospace; background: #0c0c0d; color: #00ff66; padding: 20px; font-size: 16px; line-height: 1.5; }
        button { background: #1a1a1a; color: #00ff66; border: 1px solid #00ff66; padding: 10px 20px; font-family: monospace; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        button:hover { background: #00ff66; color: #0c0c0d; }
        
        .dashboard { display: flex; gap: 20px; align-items: flex-start; }
        .metrics-block { min-width: 320px; border: 1px solid #333; padding: 15px; background: #111; }
        
        /* Контейнер, внутрь которого PixiJS встроит свой высокоскоростной WebGL-холст */
        #osc-container { 
            border: 2px solid #222; 
            background: #050505;
            width: 700px;
            height: 350px;
        }
        /* Подсветка опасных задержек Windows красным цветом */
        .alert-value { 
            color: #ff3333; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <button id="connectBtn">ОТКРЫТЬ ПОРТ И ЗАПУСТИТЬ ТЕСТ</button>

    <div class="dashboard">
        <div class="metrics-block">
            <div class="section" style="border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px;">
                <div>COM: <span id="st-port" style="color:#fff;">Ожидание подключения...</span></div>
                <div>Modbus: <span id="st-modbus" style="color:#fff;">---</span></div>
            </div>

            <div class="section" style="border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px;">
                <div>Последний интервал: <span id="m-last" style="color:#fff;">0</span> мс</div>
                <div>Средний интервал: <span id="m-avg" style="color:#fff;">0.0</span> мс</div>
                <div>Максимальный интервал: <span id="m-max" style="color:#fff;">0</span> мс</div>
                <div>Потеряно пакетов: <span id="m-skips" style="color:#fff;">0</span></div>
            </div>

            <div class="section">
                <div style="margin-bottom: 10px;">Последние 20 интервалов:</div>
                <div id="intervals-log" class="log-line" style="color: #ffffff; word-wrap: break-word; letter-spacing: 2px; font-size: 18px;">---</div>
            </div>
        </div>

        <div id="osc-container"></div>
    </div>

    <script src="ringBuffer.js"></script>

    <script src="pixiOscilloscope.js"></script>
    
    <script src="serial.js"></script>

    <script src="modbus.js"></script>
    
    <script src="main.js"></script>
</body>
</html>
